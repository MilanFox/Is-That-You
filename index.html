<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F0EEE9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1B1E25" media="(prefers-color-scheme: dark)">
  <meta name="description"
        content="Verify on the phone whether someone is really who they say — with a shared codeword that changes every 5 minutes.">
  <title>Is that you?</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="pwa/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Is that you?">
  <script type="module" src="app.js" defer></script>
</head>

<body>
<div id="boot" class="boot" role="status" aria-label="Loading">
  <span class="boot__spinner" aria-hidden="true"></span>
</div>
<main class="app">
  <section id="dashboard" class="view">
    <header class="header">
      <div class="brand">
        <img class="brand__mark" src="assets/logo.png" alt/>
        <h1 class="brand__wordmark" data-i18n="appName"></h1>
      </div>
      <div class="header__actions">
        <button id="uiLang" class="header__lang-toggle" type="button" data-active="en" aria-live="polite"
                data-i18n-aria="switchLang">
          <span data-l="de" aria-hidden="true">DE</span><span data-l="en" aria-hidden="true">EN</span>
        </button>
        <button id="addBtn" class="header__add-btn" type="button" data-i18n-aria="add">+
        </button>
      </div>
    </header>

    <div class="divider"></div>

    <p id="instruction" class="instruction" data-i18n-html="instruction"></p>

    <div id="validity" class="validity" hidden>
      <div class="validity__stamp" role="timer" aria-atomic="true">
        <span class="validity__stamp-label" data-i18n="validLabel"></span>
        <b id="timeRemaining" class="validity__stamp-time">5:00</b>
      </div>
      <div class="validity__bar" aria-hidden="true">
        <span id="validityBarFill" class="validity__bar-fill"></span>
      </div>
    </div>

    <ul id="list" class="card-list"></ul>

    <div id="empty" class="empty-state" hidden>
      <div class="empty-state__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 12.5l4 4 8-9"/>
        </svg>
      </div>
      <h2 class="empty-state__title" data-i18n="emptyTitle"></h2>
      <p class="empty-state__body" data-i18n="emptyBody"></p>
      <button id="emptyAdd" class="btn--primary" type="button" data-i18n="add"></button>
    </div>

    <footer class="footer">
      <a href="https://github.com/MilanFox/Is-That-You/" class="footer__name" data-i18n="appName"></a>
      · <a href="https://github.com/MilanFox/Is-That-You/blob/main/changelog.md" class="footer__changelog">v<span
      id="appVersion"></span></a>
    </footer>
  </section>

  <section id="add" class="view" hidden>
    <header class="header">
      <button id="cancel" class="header__back" type="button">
        <span class="header__back-chevron" aria-hidden="true">‹</span>
        <span data-i18n="back"></span>
      </button>
    </header>

    <div class="divider"></div>

    <h2 class="form__title" data-i18n="addTitle"></h2>

    <div class="form__field">
      <label class="form__label" for="groupName" data-i18n="nameLabel"></label>
      <input id="groupName" class="form__input" type="text" autocomplete="off"
             data-i18n-ph="namePh">
    </div>

    <div class="form__field">
      <label class="form__label" for="groupPassword" data-i18n="passLabel"></label>
      <input id="groupPassword" class="form__input" type="password" inputmode="text"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
             data-i18n-ph="passPh">
      <label class="form__show-toggle">
        <input type="checkbox" id="showPassword">
        <span data-i18n="showPass"></span>
      </label>
      <div class="form__strength" id="passwordStrength" data-level="" aria-live="polite">
        <div class="form__strength-bar" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <span class="form__strength-text"></span>
      </div>
    </div>

    <div class="lang-seg" role="group" data-i18n-aria="codewordLangLabel">
      <button type="button" class="lang-seg__option" data-lang="de">Deutsch</button>
      <button type="button" class="lang-seg__option" data-lang="en">English</button>
    </div>

    <button id="save" class="btn--primary" type="button" data-i18n="save" disabled></button>
    <div class="form__error" id="formError" hidden></div>
    <p class="form__note" data-i18n="addNote"></p>
  </section>
</main>

<div id="announcer-status" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="announcer-alert" class="sr-only" role="alert" aria-live="assertive" aria-atomic="true"></div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js', { type: 'module' }).catch(() => { });
    });
  }
</script>
</body>
</html>
